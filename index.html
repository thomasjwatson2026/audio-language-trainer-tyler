<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toolkit 38 Audio Trainer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>🎧 Toolkit 38 Audio Trainer</h1>
      <p class="sub">Main flow: Spanish phrase, then same phrase in Chinese (with English-sound pronunciation text).</p>

      <section class="card">
        <h2>Practice</h2>
        <div class="row">
          <button id="playNew" class="primary big">▶️ Play New (ES → ZH)</button>
          <button id="replay">🔁 Replay Current</button>
          <button id="show">✅ Show Text</button>
          <button id="refreshBtn">♻️ Hard Refresh</button>
          <label>App Speed
            <select id="speed">
              <option value="0.75">0.75x</option>
              <option value="0.85">0.85x</option>
              <option value="1" selected>1.0x</option>
              <option value="1.15">1.15x</option>
              <option value="1.3">1.3x</option>
            </select>
          </label>
        </div>
        <p id="status" class="muted">Ready.</p>
        <div id="currentText" class="hidden"></div>
      </section>

      <section class="card">
        <h2>Conversation Loops (10)</h2>
        <p class="muted">Two speakers. Each turn is Spanish first, then Chinese.</p>
        <div class="row" id="convButtons"></div>
        <div class="row">
          <button id="stopConv">⏹️ Stop Conversation</button>
        </div>
      </section>

      <section class="card">
        <h2>All 38 Phrases</h2>
        <div id="list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
