<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spanish ↔ Chinese Audio Trainer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>🎧 Spanish → Chinese Trainer</h1>
      <p class="sub">Learn by hearing Spanish first, then the same phrase in Chinese.</p>

      <section class="card">
        <h2>Practice (Main)</h2>
        <div class="row">
          <button id="playNew" class="primary big">▶️ Play New (Spanish → Chinese)</button>
          <button id="replay">🔁 Replay Current</button>
          <button id="show">✅ Show Text</button>
        </div>
        <p id="status" class="muted">Ready.</p>
        <div id="currentText" class="hidden"></div>
      </section>

      <section class="card">
        <h2>Phrase Library</h2>
        <p class="muted">Tap any row to hear Spanish then Chinese.</p>
        <div id="list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
