<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Language Trainer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>🎧 Audio Language Trainer</h1>
      <p class="sub">Spanish + Chinese • audio-first quiz</p>

      <section class="card controls">
        <label>
          Language
          <select id="languageSelect">
            <option value="mixed">Mixed</option>
            <option value="es">Spanish</option>
            <option value="zh">Chinese</option>
          </select>
        </label>

        <label>
          Direction
          <select id="directionSelect">
            <option value="toEnglish">Audio foreign ➜ answer in English</option>
            <option value="toForeign">Audio English ➜ answer in foreign language</option>
          </select>
        </label>

        <label class="inline">
          <input type="checkbox" id="audioOnly" checked />
          Audio-only mode (hide text prompt)
        </label>

        <button id="newRoundBtn" class="primary">Start / Next</button>
      </section>

      <section class="card quiz">
        <div class="promptRow">
          <p id="promptText">Press Start</p>
          <button id="playBtn">🔊 Play Again</button>
        </div>

        <div class="answerRow">
          <button id="recordBtn" class="primary">🎙️ Answer by Voice</button>
          <input id="textAnswer" type="text" placeholder="or type answer" />
          <button id="submitBtn">Check</button>
        </div>

        <p id="heardText" class="muted"></p>
        <p id="feedback"></p>

        <details>
          <summary>Reveal answer</summary>
          <p id="reveal"></p>
        </details>
      </section>

      <section class="card stats">
        <p><strong>Score:</strong> <span id="score">0</span> / <span id="total">0</span></p>
      </section>

      <section class="card tips">
        <h2>Phone tips</h2>
        <ul>
          <li>Use Chrome on Android for best voice input support.</li>
          <li>On iPhone, voice recognition support can be limited by browser.</li>
          <li>Allow microphone permissions when prompted.</li>
        </ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
