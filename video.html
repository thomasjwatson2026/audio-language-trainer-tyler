<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation Video Mode</title>
    <style>
      :root{--bg:#0d1117;--card:#1b2330;--text:#edf2ff;--muted:#9db0ce;--accent:#7db0ff}
      *{box-sizing:border-box} body{margin:0;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      .app{max-width:920px;height:100dvh;margin:0 auto;padding:6px;display:flex;flex-direction:column;overflow:hidden}
      .card{background:var(--card);padding:6px;border-radius:12px;margin:4px 0}
      .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
      .header{flex:0 0 auto;transition:all .2s ease;overflow:hidden}
      button,select{padding:10px;border-radius:10px;border:1px solid #2b3650;background:#121927;color:var(--text)}
      button{cursor:pointer}.primary{background:var(--accent);border:none;color:#071224;font-weight:800}
      .stage{position:relative;flex:1;min-height:0;background:linear-gradient(180deg,#101826,#111c2d);border-radius:12px;padding:6px;overflow:hidden;display:flex;flex-direction:column}
      .people{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px;padding-top:6px;border-top:1px solid #2a3448;flex:0 0 auto}
      .person{width:48%;display:flex;flex-direction:column;align-items:center;gap:4px}
      .avatar{position:relative;width:92px;height:92px;border-radius:999px;display:block;background:#f0c7a1;border:2px solid #2b3650;transition:transform .12s ease, box-shadow .12s ease}
      .face-b{background:#d9a273}
      .eye{position:absolute;top:34px;width:8px;height:8px;border-radius:999px;background:#1a1a1a}
      .eye-l{left:27px}.eye-r{right:27px}
      .mouth{position:absolute;left:50%;top:62px;transform:translate(-50%,-50%);width:18px;height:6px;border-radius:999px;background:#6b1f2a;transform-origin:center center;transition:transform .05s linear,width .05s linear,height .05s linear,border-radius .05s linear}
      .avatar.talking{transform:scale(1.03);box-shadow:0 0 0 3px rgba(125,176,255,.22)}
      .name{font-size:.82rem;color:var(--muted)}
      .bubble-wrap{display:flex;flex-direction:column;justify-content:flex-end;gap:8px;margin-top:4px;flex:1;min-height:0;overflow-y:auto;padding:8px 6px 8px 2px;border:1px solid #2a3448;border-radius:10px;background:#111a2a;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
      .bubble{max-width:88%;padding:10px 12px;border-radius:12px;background:#202c42;border:1px solid #32415f;min-height:72px;display:flex;align-items:center;opacity:0;transform:translateY(14px) scale(.99);animation:bIn .28s ease forwards;will-change:transform,opacity}
      .bubble.a{align-self:flex-start}.bubble.b{align-self:flex-end;background:#21314a}
      .muted{color:var(--muted)}
      .title{font-size:1.05rem;margin:0}
      .subtitle{font-size:.86rem;margin:2px 0 0}
      label{font-size:.82rem}
      button,select{padding:7px 9px;font-size:.88rem}
      .app.focus .header{max-height:0!important;padding:0!important;margin:0!important;border:0!important;opacity:0}
      @keyframes bIn{to{opacity:1;transform:translateY(0) scale(1)}}
    </style>
  </head>
  <body>
    <main class="app">
      <h1 class="title">🎬 Video Conversation Mode</h1>
      <p class="muted subtitle">Spanish first, then Chinese.</p>

      <section class="card row header">
        <label>Conversation
          <select id="conv"></select>
        </label>
        <label>Speed
          <select id="speed">
            <option value="0.75">0.75x</option>
            <option value="0.85">0.85x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.15">1.15x</option>
            <option value="1.3">1.3x</option>
          </select>
        </label>
        <button id="playEs" class="primary">▶️ Play Scene (Spanish)</button>
        <button id="playZh" class="primary">▶️ Play Scene (Chinese)</button>
        <button id="stop">⏹️ Stop</button>
        <button id="refresh">♻️ Hard Refresh</button>
        <button id="toggleHeader">🗕 Focus Mode</button>
      </section>

      <section class="card stage">
        <div id="bubbles" class="bubble-wrap"></div>
        <div class="people">
          <div class="person">
            <div id="a" class="avatar face-a">
              <span class="eye eye-l"></span><span class="eye eye-r"></span>
              <span class="mouth" id="mouthA"></span>
            </div>
            <div class="name">Speaker A</div>
          </div>
          <div class="person">
            <div id="b" class="avatar face-b">
              <span class="eye eye-l"></span><span class="eye eye-r"></span>
              <span class="mouth" id="mouthB"></span>
            </div>
            <div class="name">Speaker B</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const el={app:document.querySelector('.app'),conv:document.getElementById('conv'),speed:document.getElementById('speed'),playEs:document.getElementById('playEs'),playZh:document.getElementById('playZh'),stop:document.getElementById('stop'),refresh:document.getElementById('refresh'),toggleHeader:document.getElementById('toggleHeader'),a:document.getElementById('a'),b:document.getElementById('b'),mouthA:document.getElementById('mouthA'),mouthB:document.getElementById('mouthB'),bubbles:document.getElementById('bubbles')};
      const audio=new Audio(); audio.preload='auto';
      let convos=[]; let stop=false;
      const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

      let audioCtx=null, analyser=null, srcNode=null, rafId=null;
      const freqData = new Uint8Array(128);
      const zhMap = new Map();

      const extraZh = {
        '不客气': { pinyin:'Bú kèqi.', pronounce:'boo kuh-chee' },
        '我想喝茶': { pinyin:'Wǒ xiǎng hē chá.', pronounce:'waw shyang huh cha' },
        '干杯': { pinyin:'Gānbēi!', pronounce:'gahn-bay' },
        '很好': { pinyin:'Hěn hǎo!', pronounce:'hun how' },
        '我们改天一起去吧': { pinyin:'Wǒmen gǎitiān yìqǐ qù ba.', pronounce:'waw-men guy-tyen ee-chee chyoo ba' },
        '你好你想要什么': { pinyin:'Nǐhǎo, nǐ xiǎng yào shénme?', pronounce:'nee how, nee shyang yow shen-muh' },
        '你有水吗有': { pinyin:'Nǐ yǒu shuǐ ma? Yǒu.', pronounce:'nee yoh shway ma? yoh' },
        '太好了': { pinyin:'Tài hǎo le.', pronounce:'tie how luh' },
        '是的我喜欢住在那里': { pinyin:'Shì de, wǒ xǐhuan zhù zài nàlǐ.', pronounce:'shir duh, waw shee-hwan joo dzeye nah-lee' },
        '很好我买了': { pinyin:'Hěn hǎo, wǒ mǎi le.', pronounce:'hun how, waw my luh' },
        '我也想吃': { pinyin:'Wǒ yě xiǎng chī.', pronounce:'waw yeh shyang chir' }
      };

      function normZh(s){ return (s||'').replace(/[\s\p{P}\p{S}]/gu,''); }

      function applyMouthShape(speaker, shape){
        const target = speaker==='A' ? el.mouthA : el.mouthB;
        const other = speaker==='A' ? el.mouthB : el.mouthA;
        const shapes = {
          rest:   {w:18,h:6,r:999,sy:1},
          closed: {w:16,h:4,r:999,sy:1},
          wide:   {w:24,h:8,r:8,  sy:1.05},
          open:   {w:18,h:14,r:6, sy:1.2},
          round:  {w:13,h:13,r:999,sy:1.15},
          teeth:  {w:21,h:6,r:5, sy:1.0},
        };
        const s = shapes[shape] || shapes.rest;
        target.style.width = `${s.w}px`;
        target.style.height = `${s.h}px`;
        target.style.borderRadius = `${s.r}px`;
        target.style.transform = `translate(-50%,-50%) scale(1,${s.sy})`;

        const o = shapes.rest;
        other.style.width = `${o.w}px`;
        other.style.height = `${o.h}px`;
        other.style.borderRadius = `${o.r}px`;
        other.style.transform = 'translate(-50%,-50%) scale(1,1)';
      }

      function resetMouths(){
        for(const m of [el.mouthA, el.mouthB]){
          m.style.height='6px';
          m.style.width='18px';
          m.style.borderRadius='999px';
          m.style.transform='translate(-50%,-50%) scale(1,1)';
        }
      }

      function normalizeLatin(s){
        return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
      }

      function charToShape(ch){
        if('mbp'.includes(ch)) return 'closed';
        if('fvw'.includes(ch)) return 'teeth';
        if('ou'.includes(ch)) return 'round';
        if('a'.includes(ch)) return 'open';
        if('eiiy'.includes(ch)) return 'wide';
        if(ch===' ') return 'rest';
        return 'open';
      }

      function buildVisemeTrack(text, durationSec){
        const chars = normalizeLatin(text).replace(/[^a-z\s]/g,'').split('');
        if(!chars.length) return [{t:0,shape:'rest'}];
        const d = Math.max(0.6, durationSec || 1.6);
        const step = d / chars.length;
        return chars.map((ch,i)=>({t:i*step, shape:charToShape(ch)}));
      }

      function ensureAudioGraph(){
        if(audioCtx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return;
        audioCtx = new AC();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        srcNode = audioCtx.createMediaElementSource(audio);
        srcNode.connect(analyser);
        analyser.connect(audioCtx.destination);
      }

      function startLipSync(speaker, speakText){
        if(!analyser) return;
        cancelAnimationFrame(rafId);
        const duration = Number.isFinite(audio.duration) && audio.duration>0 ? audio.duration / Math.max(0.5, Number(el.speed.value||1)) : 1.8;
        const track = buildVisemeTrack(speakText, duration);
        const start = performance.now();

        const loop = () => {
          const elapsed = (performance.now()-start)/1000;
          let idx = 0;
          while(idx < track.length-1 && track[idx+1].t <= elapsed) idx++;
          let shape = track[idx].shape;

          // blend with live energy for subtle realism
          analyser.getByteFrequencyData(freqData);
          let sum=0; for(let i=2;i<38;i++) sum += freqData[i];
          const energy = Math.min(1, (sum / 36) / 145);
          if(energy < 0.12) shape = 'closed';
          else if(energy > 0.78 && (shape==='wide' || shape==='open')) shape = 'open';

          applyMouthShape(speaker, shape);
          rafId = requestAnimationFrame(loop);
        };
        loop();
      }

      function stopLipSync(){ cancelAnimationFrame(rafId); resetMouths(); }

      function talk(s){el.a.classList.toggle('talking',s==='A'); el.b.classList.toggle('talking',s==='B'); if(!s){el.a.classList.remove('talking');el.b.classList.remove('talking');} }

      function zhItem(zhChars){
        const key = normZh(zhChars);
        return zhMap.get(key) || extraZh[key] || null;
      }

      function zhRender(zhChars){
        const item = zhItem(zhChars);
        if(!item) return `<div>pinyin unavailable</div><div class='muted'>(add this line to map)</div>`;
        return `<div>${item.pinyin}</div><div class='muted'>(${item.pronounce})</div>`;
      }

      function addBubble(speaker, html, label){
        const d=document.createElement('div'); d.className='bubble '+speaker.toLowerCase();
        d.innerHTML=`<div><strong>${speaker} · ${label}:</strong> ${html}</div>`;
        el.bubbles.appendChild(d);
        el.bubbles.scrollTo({ top: el.bubbles.scrollHeight, behavior: 'smooth' });
      }

      async function playFile(path, speaker, speakText){
        try{
          audio.pause();
          audio.src=path;
          audio.currentTime=0;
          audio.playbackRate=Number(el.speed.value||1);
          ensureAudioGraph();
          if(audioCtx?.state === 'suspended') await audioCtx.resume();

          // wait metadata so viseme track gets better timing
          await new Promise((resolve)=>{
            const done = ()=>resolve();
            if(Number.isFinite(audio.duration) && audio.duration>0) return resolve();
            audio.addEventListener('loadedmetadata', done, { once:true });
            setTimeout(resolve, 250);
          });

          startLipSync(speaker, speakText || 'a');
          await audio.play();
          return new Promise(res=>{
            audio.onended=()=>{ stopLipSync(); res(true); };
            audio.onerror=()=>{ stopLipSync(); res(false); };
          });
        }catch{ stopLipSync(); return false; }
      }

      async function playScene(lang){
        const c=convos.find(x=>String(x.id)===el.conv.value); if(!c) return;
        stop=false; el.bubbles.innerHTML='';
        for(let i=0;i<c.turns.length;i++){
          if(stop) break;
          const t=c.turns[i], n=i+1, base=`conv_audio/c${c.id}_t${n}`;
          talk(t.speaker);
          if(lang==='es'){
            addBubble(t.speaker, `${t.es}<div class='muted'>&nbsp;</div>`, 'ES');
            if(!await playFile(base+'_es.mp3', t.speaker, t.es)) break;
          } else {
            const z = zhItem(t.zh);
            addBubble(t.speaker, zhRender(t.zh), 'ZH');
            if(!await playFile(base+'_zh.mp3', t.speaker, z?.pinyin || 'a')) break;
          }
          await sleep(220);
        }
        talk(''); stopLipSync();
      }

      async function init(){
        convos=await (await fetch('conversations.json',{cache:'no-store'})).json();
        const toolkit=await (await fetch('toolkit38.json',{cache:'no-store'})).json();
        for(const t of toolkit){ zhMap.set(normZh(t.chinese), { pinyin:t.pinyin, pronounce:t.pronounce }); }
        for(const c of convos){const o=document.createElement('option');o.value=String(c.id);o.textContent=`${c.id}: ${c.title}`;el.conv.appendChild(o)}
      }

      el.playEs.addEventListener('click',()=>playScene('es'));
      el.playZh.addEventListener('click',()=>playScene('zh'));
      el.stop.addEventListener('click',()=>{stop=true;audio.pause();talk('');stopLipSync();});

      el.toggleHeader.addEventListener('click', ()=>{
        const isFocus = el.app.classList.toggle('focus');
        el.toggleHeader.textContent = isFocus ? '🗖 Show Controls' : '🗕 Focus Mode';
      });


      el.refresh.addEventListener('click', async ()=>{
        try {
          if (window.caches && caches.keys) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k)=>caches.delete(k)));
          }
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r)=>r.unregister()));
          }
        } catch {}
        const u = new URL(window.location.href);
        u.searchParams.set('v', Date.now().toString());
        window.location.replace(u.toString());
      });
      init();
    </script>
  </body>
</html>
