<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation Video Mode</title>
    <style>
      :root{--bg:#0d1117;--card:#1b2330;--text:#edf2ff;--muted:#9db0ce;--accent:#7db0ff}
      *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      .app{max-width:920px;margin:0 auto;padding:14px}
      .card{background:var(--card);padding:8px;border-radius:14px;margin:6px 0}
      .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
      button,select{padding:10px;border-radius:10px;border:1px solid #2b3650;background:#121927;color:var(--text)}
      button{cursor:pointer}.primary{background:var(--accent);border:none;color:#071224;font-weight:800}
      .stage{position:relative;height:50vh;min-height:50vh;background:linear-gradient(180deg,#101826,#111c2d);border-radius:14px;padding:8px;overflow:hidden;display:flex;flex-direction:column}
      .people{display:flex;justify-content:space-between;margin-top:2px}
      .person{width:48%;display:flex;flex-direction:column;align-items:center;gap:4px}
      .avatar{position:relative;width:84px;height:84px;border-radius:999px;display:grid;place-items:center;font-size:42px;background:#26324a;transition:transform .12s ease, box-shadow .12s ease}
      .mouth{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);width:16px;height:8px;border-radius:999px;background:#0b1220;overflow:hidden;transform-origin:center center;transition:transform .06s linear,width .06s linear,height .06s linear,border-radius .06s linear}
      .mouth::before{content:'';position:absolute;left:50%;top:58%;transform:translate(-50%,-50%);width:10px;height:4px;border-radius:10px;background:#cf5d73;opacity:.8;transition:transform .06s linear,width .06s linear,height .06s linear}
      .avatar.talking{transform:scale(1.05);box-shadow:0 0 0 4px rgba(125,176,255,.25)}
      .name{font-size:.82rem;color:var(--muted)}
      .bubble-wrap{display:flex;flex-direction:column;gap:8px;margin-top:8px;flex:1;min-height:0;overflow-y:auto;padding:8px 6px 8px 2px;border:1px solid #2a3448;border-radius:10px;background:#111a2a;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
      .bubble{max-width:88%;padding:10px 12px;border-radius:12px;background:#202c42;border:1px solid #32415f;min-height:72px;display:flex;align-items:center;opacity:0;transform:translateY(10px) scale(.99);animation:bIn .22s ease forwards}
      .bubble.a{align-self:flex-start}.bubble.b{align-self:flex-end;background:#21314a}
      .muted{color:var(--muted)}
      @keyframes bIn{to{opacity:1;transform:translateY(0) scale(1)}}
    </style>
  </head>
  <body>
    <main class="app">
      <h1>🎬 Video Conversation Mode (Free)</h1>
      <p class="muted">Spanish first, then Chinese. Animated speakers + subtitles for faster pattern learning.</p>

      <section class="card row">
        <label>Conversation
          <select id="conv"></select>
        </label>
        <label>Speed
          <select id="speed">
            <option value="0.75">0.75x</option>
            <option value="0.85">0.85x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.15">1.15x</option>
            <option value="1.3">1.3x</option>
          </select>
        </label>
        <button id="playEs" class="primary">▶️ Play Scene (Spanish)</button>
        <button id="playZh" class="primary">▶️ Play Scene (Chinese)</button>
        <button id="stop">⏹️ Stop</button>
      </section>

      <section class="card stage">
        <div class="people">
          <div class="person"><div id="a" class="avatar">🧑🏻<span class="mouth" id="mouthA"></span></div><div class="name">Speaker A</div></div>
          <div class="person"><div id="b" class="avatar">🧑🏽<span class="mouth" id="mouthB"></span></div><div class="name">Speaker B</div></div>
        </div>
        <div id="bubbles" class="bubble-wrap"></div>
      </section>
    </main>

    <script>
      const el={conv:document.getElementById('conv'),speed:document.getElementById('speed'),playEs:document.getElementById('playEs'),playZh:document.getElementById('playZh'),stop:document.getElementById('stop'),a:document.getElementById('a'),b:document.getElementById('b'),mouthA:document.getElementById('mouthA'),mouthB:document.getElementById('mouthB'),bubbles:document.getElementById('bubbles')};
      const audio=new Audio(); audio.preload='auto';
      let convos=[]; let stop=false;
      const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

      let audioCtx=null, analyser=null, srcNode=null, rafId=null;
      const freqData = new Uint8Array(128);
      const zhMap = new Map();

      const extraZh = {
        '不客气': { pinyin:'Bú kèqi.', pronounce:'boo kuh-chee' },
        '我想喝茶': { pinyin:'Wǒ xiǎng hē chá.', pronounce:'waw shyang huh cha' },
        '干杯': { pinyin:'Gānbēi!', pronounce:'gahn-bay' },
        '很好': { pinyin:'Hěn hǎo!', pronounce:'hun how' },
        '我们改天一起去吧': { pinyin:'Wǒmen gǎitiān yìqǐ qù ba.', pronounce:'waw-men guy-tyen ee-chee chyoo ba' },
        '你好你想要什么': { pinyin:'Nǐhǎo, nǐ xiǎng yào shénme?', pronounce:'nee how, nee shyang yow shen-muh' },
        '你有水吗有': { pinyin:'Nǐ yǒu shuǐ ma? Yǒu.', pronounce:'nee yoh shway ma? yoh' },
        '太好了': { pinyin:'Tài hǎo le.', pronounce:'tie how luh' },
        '是的我喜欢住在那里': { pinyin:'Shì de, wǒ xǐhuan zhù zài nàlǐ.', pronounce:'shir duh, waw shee-hwan joo dzeye nah-lee' },
        '很好我买了': { pinyin:'Hěn hǎo, wǒ mǎi le.', pronounce:'hun how, waw my luh' },
        '我也想吃': { pinyin:'Wǒ yě xiǎng chī.', pronounce:'waw yeh shyang chir' }
      };

      function normZh(s){ return (s||'').replace(/[\s\p{P}\p{S}]/gu,''); }

      function setMouthLevel(speaker, level){
        const target = speaker==='A' ? el.mouthA : el.mouthB;
        const other = speaker==='A' ? el.mouthB : el.mouthA;

        const h = 7 + Math.round(level * 13);
        const w = 15 + Math.round(level * 8);
        target.style.height = `${h}px`;
        target.style.width = `${w}px`;
        target.style.borderRadius = `${Math.max(5, 11 - Math.round(level*5))}px`;
        target.style.transform = `translate(-50%,-50%) scaleY(${1 + level*0.55})`;

        other.style.height = '8px';
        other.style.width = '16px';
        other.style.borderRadius = '999px';
        other.style.transform = 'translate(-50%,-50%) scaleY(1)';
      }

      function resetMouths(){
        for(const m of [el.mouthA, el.mouthB]){
          m.style.height='8px';
          m.style.width='16px';
          m.style.borderRadius='999px';
          m.style.transform='translate(-50%,-50%) scaleY(1)';
        }
      }

      function ensureAudioGraph(){
        if(audioCtx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return;
        audioCtx = new AC();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        srcNode = audioCtx.createMediaElementSource(audio);
        srcNode.connect(analyser);
        analyser.connect(audioCtx.destination);
      }

      function startLipSync(speaker){
        if(!analyser) return;
        cancelAnimationFrame(rafId);
        const loop = () => {
          analyser.getByteFrequencyData(freqData);
          let sum=0;
          for(let i=2;i<38;i++) sum += freqData[i];
          const level = Math.min(1, (sum / 36) / 140);
          setMouthLevel(speaker, level);
          rafId = requestAnimationFrame(loop);
        };
        loop();
      }

      function stopLipSync(){ cancelAnimationFrame(rafId); resetMouths(); }

      function talk(s){el.a.classList.toggle('talking',s==='A'); el.b.classList.toggle('talking',s==='B'); if(!s){el.a.classList.remove('talking');el.b.classList.remove('talking');} }

      function zhRender(zhChars){
        const key = normZh(zhChars);
        const item = zhMap.get(key) || extraZh[key];
        if(!item) return `<div>pinyin unavailable</div><div class='muted'>(add this line to map)</div>`;
        return `<div>${item.pinyin}</div><div class='muted'>(${item.pronounce})</div>`;
      }

      function addBubble(speaker, html, label){
        const d=document.createElement('div'); d.className='bubble '+speaker.toLowerCase();
        d.innerHTML=`<div><strong>${speaker} · ${label}:</strong> ${html}</div>`;
        el.bubbles.appendChild(d);
        const targetTop = Math.max(0, d.offsetTop - (el.bubbles.clientHeight - d.clientHeight - 8));
        el.bubbles.scrollTo({ top: targetTop, behavior: 'smooth' });
      }

      async function playFile(path, speaker){
        try{
          audio.pause();
          audio.src=path;
          audio.currentTime=0;
          audio.playbackRate=Number(el.speed.value||1);
          ensureAudioGraph();
          if(audioCtx?.state === 'suspended') await audioCtx.resume();
          startLipSync(speaker);
          await audio.play();
          return new Promise(res=>{
            audio.onended=()=>{ stopLipSync(); res(true); };
            audio.onerror=()=>{ stopLipSync(); res(false); };
          });
        }catch{ stopLipSync(); return false; }
      }

      async function playScene(lang){
        const c=convos.find(x=>String(x.id)===el.conv.value); if(!c) return;
        stop=false; el.bubbles.innerHTML='';
        for(let i=0;i<c.turns.length;i++){
          if(stop) break;
          const t=c.turns[i], n=i+1, base=`conv_audio/c${c.id}_t${n}`;
          talk(t.speaker);
          if(lang==='es'){
            addBubble(t.speaker, `${t.es}<div class='muted'>&nbsp;</div>`, 'ES');
            if(!await playFile(base+'_es.mp3', t.speaker)) break;
          } else {
            addBubble(t.speaker, zhRender(t.zh), 'ZH');
            if(!await playFile(base+'_zh.mp3', t.speaker)) break;
          }
          await sleep(220);
        }
        talk(''); stopLipSync();
      }

      async function init(){
        convos=await (await fetch('conversations.json',{cache:'no-store'})).json();
        const toolkit=await (await fetch('toolkit38.json',{cache:'no-store'})).json();
        for(const t of toolkit){ zhMap.set(normZh(t.chinese), { pinyin:t.pinyin, pronounce:t.pronounce }); }
        for(const c of convos){const o=document.createElement('option');o.value=String(c.id);o.textContent=`${c.id}: ${c.title}`;el.conv.appendChild(o)}
      }

      el.playEs.addEventListener('click',()=>playScene('es'));
      el.playZh.addEventListener('click',()=>playScene('zh'));
      el.stop.addEventListener('click',()=>{stop=true;audio.pause();talk('');stopLipSync();});
      init();
    </script>
  </body>
</html>
