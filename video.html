      function normZh(s){ return (s||'').replace(/[\s\p{P}\p{S}]/gu,''); }

      function applyMouthShape(speaker, shape){
        const target = speaker==='A' ? el.mouthA : el.mouthB;
        const other = speaker==='A' ? el.mouthB : el.mouthA;
        const shapes = {
          rest:   {rx:9, ry:4},
          closed: {rx:8, ry:2},
          wide:   {rx:12,ry:3},
          open:   {rx:8, ry:7},
          round:  {rx:6, ry:6},
          teeth:  {rx:10,ry:3}
        };
        const s = shapes[shape] || shapes.rest;
        target.setAttribute('rx', String(s.rx));
        target.setAttribute('ry', String(s.ry));
        other.setAttribute('rx','9');
        other.setAttribute('ry','4');
      }

      function resetMouths(){
        for(const m of [el.mouthA, el.mouthB]){ m.setAttribute('rx','9'); m.setAttribute('ry','4'); }
      }

      function normalizeLatin(s){
        return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
      }

      function charToShape(ch){
        if('mbp'.includes(ch)) return 'closed';
        if('fvw'.includes(ch)) return 'teeth';
        if('ou'.includes(ch)) return 'round';
        if('a'.includes(ch)) return 'open';
        if('eiiy'.includes(ch)) return 'wide';
        if(ch===' ') return 'rest';
        return 'open';
      }

      function buildVisemeTrack(text, durationSec){
        const chars = normalizeLatin(text).replace(/[^a-z\s]/g,'').split('');
        if(!chars.length) return [{t:0,shape:'rest'}];
        const d = Math.max(0.6, durationSec || 1.6);
        const step = d / chars.length;
        return chars.map((ch,i)=>({t:i*step, shape:charToShape(ch)}));
      }

      
      function setEyeState(speaker, elapsedSec, energy){
        const eyes = speaker==='A' ? [el.aEyeL, el.aEyeR] : [el.bEyeL, el.bEyeR];
        const other = speaker==='A' ? [el.bEyeL, el.bEyeR] : [el.aEyeL, el.aEyeR];
        const blink = (Math.sin(elapsedSec * 2.6) > 0.96) || (energy < 0.09 && Math.sin(elapsedSec*5.7)>0.985);
        const x = Math.round(Math.sin(elapsedSec * 1.8) * 1.2);
        const y = Math.round(Math.cos(elapsedSec * 1.3) * 0.6);
        for(const e of eyes){
          e.setAttribute('ry', blink ? '2' : '6');
          const base = e.id.includes('L') ? 51 : 77;
          e.setAttribute('cx', String(base + x));
          e.setAttribute('cy', String(60 + y));
        }
        for(const e of other){
          e.setAttribute('ry','6');
          const base = e.id.includes('L') ? 51 : 77;
          e.setAttribute('cx', String(base));
          e.setAttribute('cy','60');
        }
      }

          const base = e.id.includes('L') ? 51 : 77;
          e.setAttribute('cx', String(base));
          e.setAttribute('cy', '60');
          e.setAttribute('ry', '6');
        }
      }

      function ensureAudioGraph(){
        if(audioCtx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return;
        audioCtx = new AC();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        srcNode = audioCtx.createMediaElementSource(audio);
        srcNode.connect(analyser);
        analyser.connect(audioCtx.destination);
      }

      function startLipSync(speaker, speakText){
        if(!analyser) return;
        cancelAnimationFrame(rafId);
        const duration = Number.isFinite(audio.duration) && audio.duration>0 ? audio.duration / Math.max(0.5, getLangSpeed(audio.dataset.lang || 'es')) : 1.8;
        const track = buildVisemeTrack(speakText, duration);
        const start = performance.now();

        const loop = () => {
          const elapsed = (performance.now()-start)/1000;
          let idx = 0;
          while(idx < track.length-1 && track[idx+1].t <= elapsed) idx++;
          let shape = track[idx].shape;

          // blend with live energy for subtle realism
          analyser.getByteFrequencyData(freqData);
          let sum=0; for(let i=2;i<38;i++) sum += freqData[i];
          const energy = Math.min(1, (sum / 36) / 145);
          if(energy < 0.12) shape = 'closed';
          else if(energy > 0.78 && (shape==='wide' || shape==='open')) shape = 'open';

          applyMouthShape(speaker, shape);
          setEyeState(speaker, elapsed, energy);
          rafId = requestAnimationFrame(loop);
        };
        loop();
      }

      function stopLipSync(){ cancelAnimationFrame(rafId); resetMouths(); resetEyes(); }

      function talk(s){el.a.classList.toggle('talking',s==='A'); el.b.classList.toggle('talking',s==='B'); if(!s){el.a.classList.remove('talking');el.b.classList.remove('talking');} }

      function zhItem(zhChars){
        const key = normZh(zhChars);
        return zhMap.get(key) || extraZh[key] || null;
      }

      function zhRender(zhChars){
        const item = zhItem(zhChars);
        if(!item) return `<div>pinyin unavailable</div><div class='muted'>(add this line to map)</div>`;
        return `<div>${item.pinyin}</div><div class='muted'>(${item.pronounce})</div>`;
      }


      async function playPreview(path, lang, speaker){
        try{
          previewAudio.pause();
          previewAudio.src = path;
          previewAudio.currentTime = 0;
          previewAudio.playbackRate = getLangSpeed(lang || 'es');
          talk(speaker);
          await previewAudio.play();
          await new Promise((resolve)=>{
            previewAudio.onended = () => resolve();
            previewAudio.onerror = () => resolve();
          });
          talk('');
        }catch{ talk(''); }
      }

      function addBubble(speaker, html, label, replay){
        const d=document.createElement('div'); d.className='bubble '+speaker.toLowerCase();
        d.innerHTML=`<div><strong>${speaker} · ${label}:</strong> ${html}</div>`;
        if(replay){
          d.style.cursor = 'pointer';
          d.title = 'Tap to replay this line';
          d.addEventListener('click', async () => {
            if(playback.active){
              playback.paused = true;
              playback.skipCurrent = true; // continue to next unseen bubble on resume
              setPlayPauseLabel();
            }
            audio.pause();
            stopLipSync();
            await playPreview(replay.path, replay.lang, speaker);
          });
        }
        el.bubbleList.appendChild(d);
        if(autoFollow){
          el.bubbles.scrollTo({ top: el.bubbles.scrollHeight, behavior: 'smooth' });
        }
      }

      
      
      
      function renderTransportButtons(){
        const loopTxt = playerPrefs.loopMode===2 ? '🔂 Loop: One' : (playerPrefs.loopMode===1 ? '🔁 Loop: All' : '🔁 Loop: Off');
        el.loopMode.textContent = loopTxt;
      }

      function savePlayerPrefs(){
        try{
          localStorage.setItem('lm_loop_mode', String(playerPrefs.loopMode));
        }catch{}
      }

      function loadPlayerPrefs(){
        try{
          const m = Number(localStorage.getItem('lm_loop_mode') || '0');
          playerPrefs.loopMode = [0,1,2].includes(m) ? m : 0;
        }catch{}
        renderTransportButtons();
      }

      
      function saveConversationPref(){
        try { localStorage.setItem(PREF_KEYS.conv, el.conv.value || '1'); } catch {}
      }

      function loadConversationPref(){
        try { return localStorage.getItem(PREF_KEYS.conv); } catch { return null; }
      }

      function saveLastLang(lang){
        try { localStorage.setItem(PREF_KEYS.lastLang, lang); } catch {}
      }

      function loadLastLang(){
        try { return localStorage.getItem(PREF_KEYS.lastLang) || 'es'; } catch { return 'es'; }
      }

      function nextConversationId(currentId){
        const ids = convos.map(c=>c.id);
        const idx = ids.indexOf(currentId);
        if(idx < 0) return ids[0] || null;
        return ids[(idx + 1) % ids.length];
      }

      function buildSpeedOptions(selectEl, defaultVal='1.0'){
        if(!selectEl) return;
        selectEl.innerHTML = '';
        for(let v=0.5; v<=2.0001; v+=0.1){
          const val = (Math.round(v*10)/10).toFixed(1);
          const o = document.createElement('option');
          o.value = val;
          o.textContent = `${val}x`;
          if(val === defaultVal) o.selected = true;
          selectEl.appendChild(o);
        }
      }

      function initSpeedSelects(){
        buildSpeedOptions(el.speedEs, '1.0');
        buildSpeedOptions(el.speedZh, '1.0');
      }

      const SPEED_KEYS = { es: 'lm_speed_es', zh: 'lm_speed_zh' };

      function getLangSpeed(lang){
        const v = lang === 'es' ? Number(el.speedEs.value || 1) : Number(el.speedZh.value || 1);
        return Number.isFinite(v) && v > 0 ? v : 1;
      }

      function saveSpeedPrefs(){
        try {
          localStorage.setItem(SPEED_KEYS.es, el.speedEs.value);
          localStorage.setItem(SPEED_KEYS.zh, el.speedZh.value);
        } catch {}
      }

      function loadSpeedPrefs(){
        try {
          const es = localStorage.getItem(SPEED_KEYS.es);
          const zh = localStorage.getItem(SPEED_KEYS.zh);
          if(es) el.speedEs.value = es;
          if(zh) el.speedZh.value = zh;
        } catch {}
      }

      async function playFile(path, speaker, speakText, lang){
        try{
          audio.pause();
          audio.src=path;
          audio.currentTime=0;
          audio.playbackRate=getLangSpeed(lang || 'es');
          ensureAudioGraph();
          if(audioCtx?.state === 'suspended') await audioCtx.resume();

          // wait metadata so viseme track gets better timing
          await new Promise((resolve)=>{
            const done = ()=>resolve();
            if(Number.isFinite(audio.duration) && audio.duration>0) return resolve();
            audio.addEventListener('loadedmetadata', done, { once:true });
            setTimeout(resolve, 250);
          });

          audio.dataset.lang = lang || 'es';
          startLipSync(speaker, speakText || 'a');
          await audio.play();
          return new Promise(res=>{
            audio.onended=()=>{ stopLipSync(); res('ended'); };
            audio.onerror=()=>{ stopLipSync(); res('error'); };
            audio.onpause=()=>{ if(playback.paused){ stopLipSync(); res('paused'); } };
          });
        }catch{ stopLipSync(); return false; }
      }

      async function playScene(lang){
        const c=convos.find(x=>String(x.id)===el.conv.value); if(!c) return;
        playback.active = true;
        playback.paused = false;
        playback.skipCurrent = false;
        playback.convId = c.id;
        playback.lang = lang;
        saveLastLang(lang);
        playback.index = 0;
        setPlayPauseLabel();

        el.bubbleList.innerHTML='';
        applySpeakerUnits();

        while(playback.active && playback.index < c.turns.length){
          if(playback.paused){ await sleep(120); continue; }

          const i = playback.index;
          const t = c.turns[i], n=i+1, base=`conv_audio/c${c.id}_t${n}`;
          talk(t.speaker);

          let result = 'error';
          if(lang==='es'){
            addBubble(t.speaker, `${t.es}<div class='muted'>&nbsp;</div>`, 'ES', { path: base+'_es.mp3', text: t.es, lang: 'es' });
            result = await playFile(base+'_es.mp3', t.speaker, t.es, 'es');
          } else {
            const z = zhItem(t.zh);
            addBubble(t.speaker, zhRender(t.zh), 'ZH', { path: base+'_zh.mp3', text: (z?.pinyin || 'a'), lang: 'zh' });
            result = await playFile(base+'_zh.mp3', t.speaker, z?.pinyin || 'a', 'zh');
          }

          if(result === 'paused'){
            if(playback.skipCurrent){
              playback.index += 1; // move to next bubble on resume
              playback.skipCurrent = false;
            }
            await sleep(80);
            continue;
          }
          if(result !== 'ended') break;

          playback.index += 1;
          await sleep(220);
        }

        talk(''); stopLipSync();
        const finishedConvId = playback.convId;
        const finishedLang = playback.lang;
        const canAdvance = playback.index >= c.turns.length;

        playback.active = false;
        playback.paused = false;
        playback.skipCurrent = false;
        setPlayPauseLabel();

        if(canAdvance && playerPrefs.loopMode !== 0){
          let targetId = null;
          if(playerPrefs.loopMode === 2){
            targetId = finishedConvId; // loop one
          } else if(playerPrefs.loopMode === 1){
            targetId = nextConversationId(finishedConvId); // loop all
          }
          if(targetId != null){
            el.conv.value = String(targetId);
            saveConversationPref();
            setTimeout(()=>playScene(finishedLang), 280);
          }
        }
      }

      
      const unitPool = [
        {id:'peasant', cls:'unit-peasant', name:'Peasant', badge:'🧱 Peasant', bg1:'#c89f74', bg2:'#5a6f8f', face:'#d9b389'},
        {id:'footman', cls:'unit-footman', name:'Footman', badge:'🛡️ Footman', bg1:'#7089b9', bg2:'#445977', face:'#d1b090'},
        {id:'archer', cls:'unit-archer', name:'Archer', badge:'🏹 Archer', bg1:'#74a66f', bg2:'#476a45', face:'#d2b18f'},
        {id:'grunt', cls:'unit-grunt', name:'Grunt', badge:'🪓 Grunt', bg1:'#7a9f58', bg2:'#415b35', face:'#b78f6b'}
      ];

      function applyUnitTheme(side, unit){
        if(side==='a'){
          el.aBg1.setAttribute('stop-color', unit.bg1);
          el.aBg2.setAttribute('stop-color', unit.bg2);
          el.aFace.setAttribute('fill', unit.face);
          el.aBadge.textContent = unit.badge;
          el.aName.textContent = `Speaker A · ${unit.name}`;
        } else {
          el.bBg1.setAttribute('stop-color', unit.bg1);
          el.bBg2.setAttribute('stop-color', unit.bg2);
          el.bFace.setAttribute('fill', unit.face);
          el.bBadge.textContent = unit.badge;
          el.bName.textContent = `Speaker B · ${unit.name}`;
        }
      }

      function applySpeakerUnits(){
        const pick = () => unitPool[Math.floor(Math.random()*unitPool.length)];
        const a = pick(); let b = pick();
        while(b.id === a.id) b = pick();
        applyUnitTheme('a', a);
        applyUnitTheme('b', b);
      }

      async function init(){
        convos=await (await fetch('conversations.json',{cache:'no-store'})).json();
        const toolkit=await (await fetch('toolkit38.json',{cache:'no-store'})).json();
        for(const t of toolkit){ zhMap.set(normZh(t.chinese), { pinyin:t.pinyin, pronounce:t.pronounce }); }
        for(const c of convos){const o=document.createElement('option');o.value=String(c.id);o.textContent=`${c.id}: ${c.title}`;el.conv.appendChild(o)}
        const savedConv = loadConversationPref();
        if(savedConv && convos.some(c=>String(c.id)===savedConv)) el.conv.value = savedConv;
        applySpeakerUnits();
      }

      el.playEs.addEventListener('click',()=>playScene('es'));
      el.playZh.addEventListener('click',()=>playScene('zh'));
      el.conv.addEventListener('change', saveConversationPref);
      el.stop.addEventListener('click',()=>{
        if(!playback.active) return;
        playback.paused = !playback.paused;
        if(playback.paused){
          playback.skipCurrent = true; // resume from next unseen bubble
          audio.pause();
          talk('');
          stopLipSync();
        }
        setPlayPauseLabel();
      });
      el.speedEs.addEventListener('change', saveSpeedPrefs);
      el.speedZh.addEventListener('change', saveSpeedPrefs);
      el.bubbles.addEventListener('scroll', ()=>{
        const nearBottom = el.bubbles.scrollHeight - (el.bubbles.scrollTop + el.bubbles.clientHeight) < 24;
        autoFollow = nearBottom;
      });
      el.loopMode.addEventListener('click', ()=>{
        playerPrefs.loopMode = (playerPrefs.loopMode + 1) % 3;
        savePlayerPrefs();
        renderTransportButtons();
      });
initSpeedSelects();
      loadSpeedPrefs();
      loadPlayerPrefs();
      setPlayPauseLabel();
      init();
    </script>
      <script src="nav.js"></script>
</body>
