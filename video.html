<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation Video Mode</title>
    <style>
      :root{--bg:#0d1117;--card:#1b2330;--text:#edf2ff;--muted:#9db0ce;--accent:#7db0ff}
      *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      .app{max-width:920px;margin:0 auto;padding:14px}
      .card{background:var(--card);padding:14px;border-radius:14px;margin:12px 0}
      .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
      button,select{padding:10px;border-radius:10px;border:1px solid #2b3650;background:#121927;color:var(--text)}
      button{cursor:pointer}.primary{background:var(--accent);border:none;color:#071224;font-weight:800}
      .stage{position:relative;min-height:360px;background:linear-gradient(180deg,#101826,#111c2d);border-radius:14px;padding:14px;overflow:hidden}
      .people{display:flex;justify-content:space-between;margin-top:8px}
      .person{width:48%;display:flex;flex-direction:column;align-items:center;gap:8px}
      .avatar{position:relative;width:110px;height:110px;border-radius:999px;display:grid;place-items:center;font-size:54px;background:#26324a;transition:transform .15s ease, box-shadow .15s ease}
      .avatar::after{content:'';position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:18px;height:6px;border-radius:999px;background:#0b1220;opacity:.8}
      .avatar.talking{transform:scale(1.05);box-shadow:0 0 0 4px rgba(125,176,255,.25)}
      .avatar.talking::after{animation:mouth .18s infinite ease-in-out}
      @keyframes mouth{0%{width:16px;height:5px}50%{width:24px;height:11px}100%{width:16px;height:5px}}
      .name{font-size:.92rem;color:var(--muted)}
      .bubble-wrap{display:flex;flex-direction:column;gap:8px;margin-top:16px}
      .bubble{max-width:78%;padding:10px 12px;border-radius:12px;background:#202c42;border:1px solid #32415f}
      .bubble.a{align-self:flex-start}.bubble.b{align-self:flex-end;background:#21314a}
      .muted{color:var(--muted)}
    </style>
  </head>
  <body>
    <main class="app">
      <h1>🎬 Video Conversation Mode (Free)</h1>
      <p class="muted">Spanish first, then Chinese. Animated speakers + subtitles for faster pattern learning.</p>

      <section class="card row">
        <label>Conversation
          <select id="conv"></select>
        </label>
        <label>Speed
          <select id="speed">
            <option value="0.75">0.75x</option>
            <option value="0.85">0.85x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.15">1.15x</option>
            <option value="1.3">1.3x</option>
          </select>
        </label>
        <button id="playEs" class="primary">▶️ Play Scene (Spanish)</button>
        <button id="playZh" class="primary">▶️ Play Scene (Chinese)</button>
        <button id="stop">⏹️ Stop</button>
      </section>

      <section class="card stage">
        <div class="people">
          <div class="person"><div id="a" class="avatar">🧑🏻</div><div class="name">Speaker A</div></div>
          <div class="person"><div id="b" class="avatar">🧑🏽</div><div class="name">Speaker B</div></div>
        </div>
        <div id="bubbles" class="bubble-wrap"></div>
      </section>
    </main>

    <script>
      const el={conv:document.getElementById('conv'),speed:document.getElementById('speed'),playEs:document.getElementById('playEs'),playZh:document.getElementById('playZh'),stop:document.getElementById('stop'),a:document.getElementById('a'),b:document.getElementById('b'),bubbles:document.getElementById('bubbles')};
      const audio=new Audio(); audio.preload='auto';
      let convos=[]; let stop=false;
      const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
      const id2=(n)=>String(n).padStart(2,'0');
      function addBubble(speaker,text,label){
        const d=document.createElement('div'); d.className='bubble '+speaker.toLowerCase();
        d.innerHTML=`<div><strong>${speaker} · ${label}:</strong> ${text}</div>`;
        el.bubbles.appendChild(d); el.bubbles.scrollTop=el.bubbles.scrollHeight;
      }
      async function playFile(path){
        try{audio.pause(); audio.src=path; audio.currentTime=0; audio.playbackRate=Number(el.speed.value||1); await audio.play();
          return new Promise(res=>{audio.onended=()=>res(true); audio.onerror=()=>res(false)});
        }catch{return false}
      }
      function talk(s){el.a.classList.toggle('talking',s==='A'); el.b.classList.toggle('talking',s==='B');}
      async function playScene(lang){
        const c=convos.find(x=>String(x.id)===el.conv.value); if(!c) return;
        stop=false; el.bubbles.innerHTML='';
        for(let i=0;i<c.turns.length;i++){
          if(stop) break;
          const t=c.turns[i], n=i+1, base=`conv_audio/c${c.id}_t${n}`;
          talk(t.speaker);
          if(lang==='es'){
            addBubble(t.speaker,t.es,'ES');
            if(!await playFile(base+'_es.mp3')) break;
          } else {
            addBubble(t.speaker,t.zh,'ZH');
            if(!await playFile(base+'_zh.mp3')) break;
          }
          await sleep(220);
        }
        talk('');
      }
      async function init(){
        convos=await (await fetch('conversations.json',{cache:'no-store'})).json();
        for(const c of convos){const o=document.createElement('option');o.value=String(c.id);o.textContent=`${c.id}: ${c.title}`;el.conv.appendChild(o)}
      }
      el.playEs.addEventListener('click',()=>playScene('es'));
      el.playZh.addEventListener('click',()=>playScene('zh'));
      el.stop.addEventListener('click',()=>{stop=true;audio.pause();talk('')});
      init();
    </script>
  </body>
</html>
